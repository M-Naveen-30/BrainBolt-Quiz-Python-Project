; ==========================================================
;   BrainBolt - Configuration File
;   Edit this with your Gmail credentials before running
; ==========================================================
;
;  HOW TO GET A GMAIL APP PASSWORD (16 characters)
;  ------------------------------------------------------
;  1) Go to  https://myaccount.google.com/security
;  2) Turn ON  2-Step Verification  (required)
;  3) Go to   https://myaccount.google.com/apppasswords
;  4) Choose  App = "Mail"  ,  Device = "Other (BrainBolt)"
;  5) Google shows a 16-character password - paste it below
;     (no spaces, all lowercase)
; ==========================================================

[email]
sender_email     = your_email@gmail.com
sender_app_pass  = your16charapppass
sender_name      = BrainBolt Team

[app]
project_name     = BrainBolt
tagline          = Spark Your Mind
default_country  = +91
